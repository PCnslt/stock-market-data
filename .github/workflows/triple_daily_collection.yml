name: Triple Daily Market Data Collection

on:
  schedule:
    # NOTE: minutes are intentionally off the top of the hour. GitHub delays/drops
    # scheduled runs most aggressively at :00 of popular hours. Commit type is
    # selected from github.event.schedule below, so a delayed run still maps to the
    # correct type (the old version keyed off the execution hour and silently did
    # nothing whenever a run slipped past the hour boundary).

    # WEEKDAYS
    - cron: '17 8 * * 1-5'    # pre-market   (8:17 AM UTC)
    - cron: '17 13 * * 1-5'   # mid-day      (1:17 PM UTC)
    - cron: '17 21 * * 1-5'   # end-of-day   (9:17 PM UTC)

    # WEEKENDS
    - cron: '17 10 * * 6'     # Sat: weekend historical
    - cron: '17 14 * * 6'     # Sat: weekend news
    - cron: '17 10 * * 0'     # Sun: weekend alternative
    - cron: '17 14 * * 0'     # Sun: weekend summary

  workflow_dispatch:  # Allow manual triggering
    inputs:
      commit_type:
        description: 'pre_market | mid_day | end_of_day | weekend_all | all'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  collect-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_TOKEN_WRITE }}
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r scripts/requirements.txt

    - name: Determine commit type from schedule
      id: commit_type
      run: |
        EVENT="${{ github.event_name }}"
        SCHED="${{ github.event.schedule }}"
        HOUR=$(date -u +%H)
        DOW=$(date -u +%u)   # 1=Mon .. 7=Sun
        echo "event=$EVENT schedule=$SCHED hour=$HOUR dow=$DOW"

        if [ "$EVENT" = "schedule" ]; then
          # Deterministic map from the cron string that fired (delay-proof).
          case "$SCHED" in
            "17 8 * * 1-5")  CT="pre_market" ;;
            "17 13 * * 1-5") CT="mid_day" ;;
            "17 21 * * 1-5") CT="end_of_day" ;;
            "17 10 * * 6")   CT="weekend_historical" ;;
            "17 14 * * 6")   CT="weekend_news" ;;
            "17 10 * * 0")   CT="weekend_alternative" ;;
            "17 14 * * 0")   CT="weekend_summary" ;;
            # Never fall through to a no-op: pick a valid type by day so a run
            # always collects *something* and produces a commit.
            *) if [ "$DOW" -ge 6 ]; then CT="weekend_all"; else CT="end_of_day"; fi ;;
          esac
        else
          # workflow_dispatch
          IN="${{ github.event.inputs.commit_type }}"
          if [ -n "$IN" ] && [ "$IN" != "all" ]; then
            CT="$IN"
          elif [ "$DOW" -ge 6 ]; then
            CT="weekend_all"
          elif [ "$HOUR" -lt 12 ]; then
            CT="pre_market"
          elif [ "$HOUR" -lt 17 ]; then
            CT="mid_day"
          else
            CT="end_of_day"
          fi
        fi

        echo "COMMIT_TYPE=$CT" >> "$GITHUB_OUTPUT"
        echo "Determined commit type: $CT"

    # ---- Collection steps (run from scripts/ so data lands in scripts/data/ as designed) ----
    - name: Run Pre-Market Collection
      if: steps.commit_type.outputs.COMMIT_TYPE == 'pre_market'
      run: |
        cd scripts
        python pre_market_collection.py
      env:
        COMMIT_TYPE: pre_market
        ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        FMP_KEY: ${{ secrets.FMP_KEY }}
        NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}

    - name: Run Mid-Day Analysis
      if: steps.commit_type.outputs.COMMIT_TYPE == 'mid_day'
      run: |
        cd scripts
        python mid_day_analysis.py
      env:
        COMMIT_TYPE: mid_day
        ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        FMP_KEY: ${{ secrets.FMP_KEY }}
        NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}

    - name: Run End-of-Day Collection
      if: steps.commit_type.outputs.COMMIT_TYPE == 'end_of_day'
      run: |
        cd scripts
        python collect_data.py
      env:
        COMMIT_TYPE: end_of_day
        ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        FMP_KEY: ${{ secrets.FMP_KEY }}
        NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}

    # ---- Weekend collections (all use weekend_collection.py) ----
    - name: Run Weekend Collection
      if: startsWith(steps.commit_type.outputs.COMMIT_TYPE, 'weekend_')
      run: |
        cd scripts
        python weekend_collection.py
      env:
        COMMIT_TYPE: ${{ steps.commit_type.outputs.COMMIT_TYPE }}
        ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        FMP_KEY: ${{ secrets.FMP_KEY }}
        NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}

    # ---- Commit directly to the default branch ----
    - name: Commit and push to main
      id: commit
      run: |
        # Author commits as the repo owner's verified GitHub noreply address so
        # every automated commit counts toward the contribution graph.
        git config user.name "PCnslt"
        git config user.email "97403801+PCnslt@users.noreply.github.com"

        git add -A

        if git diff --cached --quiet; then
          echo "No changes to commit for this run."
          echo "committed=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        DATE=$(TZ=America/New_York date +%Y-%m-%d)
        TIME=$(TZ=America/New_York date +%H%M)
        CT="${{ steps.commit_type.outputs.COMMIT_TYPE }}"

        case "$CT" in
          pre_market)  MSG="Pre-market data collection for $DATE at $TIME EST" ;;
          mid_day)     MSG="Mid-day market analysis for $DATE at $TIME EST" ;;
          end_of_day)  MSG="End-of-day data collection for $DATE at $TIME EST" ;;
          weekend_*)   MSG="Weekend comprehensive data collection for $DATE" ;;
          *)           MSG="Market data collection for $DATE at $TIME EST" ;;
        esac

        git commit -m "$MSG"

        # Re-base on any commits that landed since checkout, then push to main.
        git pull --rebase origin main || true
        git push origin HEAD:main

        echo "committed=true" >> "$GITHUB_OUTPUT"
        echo "Committed and pushed: $MSG"

    - name: Create workflow summary
      run: |
        echo "## Market Data Collection" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "**Commit type:** ${{ steps.commit_type.outputs.COMMIT_TYPE }}" >> "$GITHUB_STEP_SUMMARY"
        echo "**Triggered by:** ${{ github.event_name }} ${{ github.event.schedule }}" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        if [ "${{ steps.commit.outputs.committed }}" = "true" ]; then
          echo "Changes committed and pushed to main." >> "$GITHUB_STEP_SUMMARY"
        else
          echo "No changes to commit for this run." >> "$GITHUB_STEP_SUMMARY"
        fi
