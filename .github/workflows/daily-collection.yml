name: Daily Stock Data Collection with PRs

on:
  schedule:
    # Run at 9:00 PM UTC daily (4:00 PM EST, 1:00 PM PST)
    - cron: '0 21 * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  collect-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        cd scripts
        pip install -r requirements.txt
    
    - name: Determine day type
      id: day_check
      run: |
        DAY_OF_WEEK=$(date -u +%u)  # 1=Monday, 7=Sunday
        echo "DAY_OF_WEEK=$DAY_OF_WEEK" >> $GITHUB_OUTPUT
        
        if [ $DAY_OF_WEEK -ge 1 ] && [ $DAY_OF_WEEK -le 5 ]; then
          echo "DAY_TYPE=weekday" >> $GITHUB_OUTPUT
          echo "ACTIVITY_TYPE=data_collection" >> $GITHUB_OUTPUT
        elif [ $DAY_OF_WEEK -eq 6 ]; then
          echo "DAY_TYPE=saturday" >> $GITHUB_OUTPUT
          echo "ACTIVITY_TYPE=weekly_summary" >> $GITHUB_OUTPUT
        else
          echo "DAY_TYPE=sunday" >> $GITHUB_OUTPUT
          echo "ACTIVITY_TYPE=code_improvement" >> $GITHUB_OUTPUT
        fi
    
    - name: Weekday - Collect stock market data
      if: steps.day_check.outputs.DAY_TYPE == 'weekday'
      run: |
        cd scripts
        python collect_data.py
    
    - name: Saturday - Generate weekly summary
      if: steps.day_check.outputs.DAY_TYPE == 'saturday'
      run: |
        cd scripts
        python weekly_summary.py
    
    - name: Sunday - Code improvements
      if: steps.day_check.outputs.DAY_TYPE == 'sunday'
      run: |
        cd scripts
        python sunday_improvements.py
    
    - name: Configure Git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
    
    - name: Create Pull Request
      id: create_pr
      run: |
        cd scripts
        python create_pr.py
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        DAY_TYPE: ${{ steps.day_check.outputs.DAY_TYPE }}
        ACTIVITY_TYPE: ${{ steps.day_check.outputs.ACTIVITY_TYPE }}
    
    - name: Wait for checks to complete
      if: steps.create_pr.outputs.pr_number != ''
      run: |
        echo "Waiting 30 seconds for checks to start..."
        sleep 30
        
        # Wait up to 2 minutes for checks to complete
        for i in {1..12}; do
          echo "Check $i/12: Waiting 10 seconds..."
          sleep 10
        done
    
    - name: Auto-merge Pull Request
      if: steps.create_pr.outputs.pr_number != ''
      run: |
        echo "Attempting to auto-merge PR #${{ steps.create_pr.outputs.pr_number }}"
        
        # Enable auto-merge with squash
        gh pr merge ${{ steps.create_pr.outputs.pr_number }} --auto --squash --body "Automatically merged by GitHub Actions"
        
        echo "✅ Auto-merge enabled for PR #${{ steps.create_pr.outputs.pr_number }}"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Create summary
      run: |
        echo "## Stock Market Data Update" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Day Type:** ${{ steps.day_check.outputs.DAY_TYPE }}" >> $GITHUB_STEP_SUMMARY
        echo "**Activity:** ${{ steps.day_check.outputs.ACTIVITY_TYPE }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ "${{ steps.create_pr.outputs.pr_number }}" != "" ]; then
          echo "✅ Pull Request #${{ steps.create_pr.outputs.pr_number }} created and auto-merge enabled!" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️  No changes to commit today." >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "The workflow has completed successfully." >> $GITHUB_STEP_SUMMARY